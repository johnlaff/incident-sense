name: backend-ci

# Run the backend quality gates whenever backend code changes (and on the
# workflow file itself). Keeping the path filter tight keeps CI fast.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      # setup-uv handles installing uv and caching the wheel downloads.
      # `uv sync` then provisions Python 3.12 (per requires-python) and installs
      # the project + dev dependencies. The clustering/gen extras are only
      # needed by the precompute/generate scripts, so CI skips them.
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy src

      - name: Tests (pytest)
        run: uv run pytest
