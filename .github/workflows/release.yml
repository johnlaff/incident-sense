name: release

# Triggered by a semver tag (e.g. v0.1.0). Publishes a GitHub Release whose body
# is the matching section of CHANGELOG.md, then builds and pushes the backend and
# frontend images to GHCR. workflow_dispatch allows a manual re-run for a tag.
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@v7

      # Untrusted inputs are read via env (never interpolated into the shell)
      # and the tag is validated against a strict semver pattern before use.
      - name: Resolve and validate tag
        env:
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG:-$REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' is not in vX.Y.Z form"; exit 1
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: Extract changelog section
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          set -euo pipefail
          # Print the body of the "## [VERSION]" section from CHANGELOG.md
          # (Keep a Changelog format), stopping at the next "## [" heading.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag = 1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "Release $TAG" > release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          body_path: release-notes.md

  images:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write # push to GHCR
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            build_args: ""
          - name: frontend
            context: ./frontend
            build_args: "NEXT_PUBLIC_API_URL=http://localhost:8000"
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version
        env:
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG:-$REF_NAME}"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ghcr.io/johnlaff/incident-sense-${{ matrix.name }}:${{ env.VERSION }}
            ghcr.io/johnlaff/incident-sense-${{ matrix.name }}:latest
